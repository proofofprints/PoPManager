name: Feature Request
description: Suggest a new feature or improvement
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        Have an idea for PoPManager? We'd love to hear it!

  - type: textarea
    id: problem
    attributes:
      label: What problem does this solve?
      description: Describe the use case or pain point.
      placeholder: "I'm always doing X manually, and it would be great if PoPManager could..."
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: Describe the solution you'd like
      description: How should this feature work?
      placeholder: "A button on the Dashboard that..."
    validations:
      required: true

  - type: dropdown
    id: area
    attributes:
      label: Which part of PoPManager does this affect?
      options:
        - Dashboard
        - ASIC Miners
        - Mobile Miners
        - Pool Management
        - Alerts & Notifications
        - Settings
        - Data Export
        - New miner support
        - New coin support
        - Other
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives you've considered
      description: Any workarounds or other approaches you've thought about.

  - type: textarea
    id: context
    attributes:
      label: Additional context
      description: Screenshots, links, or anything else that helps explain the request.
